<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <title>Runtime Assets v1 — GLB Export</title>
  <style>
    html, body { margin: 0; min-height: 100%; background: #101611; color: #edf7ef; font: 14px system-ui, sans-serif; }
    main { max-width: 760px; margin: 40px auto; padding: 24px; background: #17231b; border: 1px solid #31483a; border-radius: 10px; }
    button { padding: 10px 16px; margin-right: 8px; color: white; background: #28643b; border: 0; border-radius: 6px; cursor: pointer; }
    button:disabled { opacity: 0.45; cursor: default; }
    #status { margin-top: 18px; color: #9ee6ac; font-family: ui-monospace, monospace; white-space: pre-wrap; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "../node_modules/three/build/three.module.js",
      "three/addons/": "../node_modules/three/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <main>
    <h1>Table LOD Package Round Trip</h1>
    <p>Download stays disabled until GLTFLoader reloads all three LODs and finds the semantic <code>top</code> node.</p>
    <button id="verifyButton" type="button">Build and verify package</button>
    <button id="downloadButton" type="button" disabled>Download package</button>
    <div id="status">READY</div>
  </main>
  <script type="module">
    import { Box3, Vector3 } from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { createTable } from '../generators/createTable.js';
    import { exportSculptAsset } from '../runtime/exportSculptAsset.js';
    import { exportAssetPackage } from '../runtime/exportAssetPackage.js';

    const status = document.getElementById('status');
    const verifyButton = document.getElementById('verifyButton');
    const downloadButton = document.getElementById('downloadButton');
    const recipe = {
      schemaVersion: '1.0',
      id: 'table-export',
      profile: 'prop',
      seed: 1,
      units: 'meters',
      coordinateFrame: { up: '+Y', forward: '+Z', origin: 'ground-center' },
      parameters: { detail: 1, geometryQuality: 1, materialQuality: 1 },
      components: [], materials: [], articulation: [], affordances: [], lod: {},
    };
    let verifiedPackage = null;

    function reloadGlb(bytes) {
      const loader = new GLTFLoader();
      return new Promise((resolve, reject) => {
        loader.parse(bytes, '', resolve, reject);
      });
    }

    verifyButton.addEventListener('click', async () => {
      verifyButton.disabled = true;
      downloadButton.disabled = true;
      status.textContent = 'EXPORTING';
      try {
        verifiedPackage = await exportAssetPackage(recipe, {
          createAsset: quality => createTable({ id: recipe.id, seed: recipe.seed, ...quality }),
          exportAsset: exportSculptAsset,
          validateArtifact: async bytes => {
            const gltf = await reloadGlb(bytes);
            if (!gltf.scene.getObjectByName('top')) throw new Error('reloaded GLB is missing top node');
            const size = new Box3().setFromObject(gltf.scene).getSize(new Vector3());
            if (size.x <= 0 || size.y <= 0 || size.z <= 0) throw new Error('reloaded GLB has invalid bounds');
          },
          generatorVersion: '1.0.0',
        });
        downloadButton.disabled = false;
        const bytes = verifiedPackage.artifacts.reduce((sum, item) => sum + item.bytes.byteLength, 0);
        status.textContent = `EXPORT_OK · ${verifiedPackage.artifacts.length} GLBs · ${bytes} total bytes`;
      } catch (error) {
        status.textContent = `EXPORT_FAILED · ${error.message}`;
      } finally {
        verifyButton.disabled = false;
      }
    });

    downloadButton.addEventListener('click', () => {
      const download = (filename, value, type) => {
        const url = URL.createObjectURL(new Blob([value], { type }));
        const link = document.createElement('a');
        link.href = url;
        link.download = filename;
        link.click();
        URL.revokeObjectURL(url);
      };
      for (const artifact of verifiedPackage.artifacts) {
        download(artifact.filename, artifact.bytes, 'model/gltf-binary');
      }
      download('asset-manifest.json', JSON.stringify(verifiedPackage.manifest, null, 2), 'application/json');
      download('recipe.json', JSON.stringify(recipe, null, 2), 'application/json');
    });
  </script>
</body>
</html>
